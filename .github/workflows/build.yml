name: Build Durbin Client

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Find Gradle project
        id: find_project
        shell: bash
        run: |
          PROJECT_FILE=$(find . -maxdepth 4 -type f -name "settings.gradle" | head -n 1)
          if [ -z "$PROJECT_FILE" ]; then
            echo "No settings.gradle found"
            find . -maxdepth 4 -print
            exit 1
          fi
          PROJECT_DIR=$(dirname "$PROJECT_FILE")
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "Found Gradle project at $PROJECT_DIR"

      - name: Build 1.20.1
        shell: bash
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: |
          chmod +x ./gradlew
          ./gradlew :1.20:build --stacktrace

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: Durbin-Client-JAR
          path: ${{ steps.find_project.outputs.project_dir }}/1.20/build/libs/*.jar
