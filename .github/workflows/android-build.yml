name: Build DURBIN Launcher APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Clone Amethyst
        run: git clone --recursive https://github.com/AngelAuraMC/Amethyst-Android.git Amethyst-Android

      - name: Apply local app_pojavlauncher changes
        run: |
          if [ -d "app_pojavlauncher" ]; then
            rsync -av app_pojavlauncher/ Amethyst-Android/app_pojavlauncher/
          else
            echo "No local app_pojavlauncher folder found, building clean Amethyst source."
          fi

      - name: Build APK
        working-directory: Amethyst-Android
        run: chmod +x gradlew && ./gradlew :app_pojavlauncher:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DURBIN-Amethyst-Debug-APK
          path: Amethyst-Android/app_pojavlauncher/build/outputs/apk/debug/*.apk
