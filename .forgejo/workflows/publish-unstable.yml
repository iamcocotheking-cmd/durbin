name: Publish Unstable Version
on:
  workflow_dispatch:

jobs:
  release:
    name: "Publish Unstable Version"
    runs-on: docker
    container:
      image: ghcr.io/catthehacker/ubuntu:act-24.04
    permissions:
      contents: write
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v6

      - uses: https://github.com/gradle/actions/wrapper-validation@v5.0.0

      - uses: https://github.com/actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 25

      - name: Setup Gradle
        uses: https://github.com/gradle/actions/setup-gradle@v5.0.0
        with:
          cache-read-only: true

      - name: Build
        run: ./gradlew build collectBuilds --stacktrace

      - name: Publish to Maven
        run: ./gradlew publishUnstable -PowlMavenPassword=${{ secrets.MAVEN_PASSWORD }} -PowlMavenUsername=${{ secrets.MAVEN_USERNAME }}
